name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install dependencies
        run: sudo apt update && sudo apt install qemu-utils bzip2 bash

      - name: Build
        run: sudo -E ./build-image.sh

      - uses: actions/upload-artifact@v4
        with:
          name: alpine-virt-image.qcow2.bz2
          path: "*.bz2"
          
      - name: Print Alpine Version
        run: |
          echo "=== Build Environment ==="
          cat /etc/os-release
          echo "=== Alpine Version ==="
          cat /etc/alpine-release || echo "Alpine file not found in runner"

      - name: Read version
        id: getversion
        run: |
          VERSION=$(sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - uses: marvinpinto/action-automatic-releases@latest
        if: github.ref == 'refs/heads/master'
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          files: "*.bz2"
          automatic_release_tag: ${{ steps.getversion.outputs.version }}
          prerelease: false
